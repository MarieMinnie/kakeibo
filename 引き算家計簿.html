function yen(n){return"ВҘ"+Math.abs(Math.round(n)).toLocaleString("ja-JP");}
function today(){return new Date().toISOString().slice(0,10);}
function getBM(){
  const d=new Date(),y=d.getFullYear(),m=d.getMonth(),day=d.getDate();
  if(day>=15)return{start:new Date(y,m,15),label:`${y}е№ҙ${m+1}жңҲ15ж—ҘгҖң`};
  const pm=m===0?11:m-1,py=m===0?y-1:y;
  return{start:new Date(py,pm,15),label:`${py}е№ҙ${pm+1}жңҲ15ж—ҘгҖң`};
}
function getWI(dateStr,start){
  const diff=Math.floor((new Date(dateStr)-start)/86400000);
  return Math.min(Math.max(Math.floor(diff/7),0),4);
}
function getCat(id){return state.cats.find(c=>c.id===id)||{icon:"вқ“",label:"дёҚжҳҺ",color:"#aaa"};}
function getCard(id){
  if(id&&id.startsWith("em_")){const emId=id.replace("em_","");return state.emoney.find(e=>e.id===emId)||{icon:"рҹӣ’",name:"йӣ»еӯҗгғһгғҚгғј",color:"#e53935"};}
  return state.cards.find(c=>c.id===id)||{icon:"рҹ’ҙ",name:"зҸҫйҮ‘",color:"#aaa"};
}
function getFixedCat(id){return FIXED_CATS.find(c=>c.id===id)||FIXED_CATS[0];}

function calcTotals(){
  // е®үе…ЁеҜҫзӯ–пјҡжңӘе®ҡзҫ©гҒ®е ҙеҗҲгҒҜз©әй…ҚеҲ—
  if(!state.emoney) state.emoney = [];
  if(!state.incomes) state.incomes = [];
  if(!state.fixed) state.fixed = [];
  const totalIncome  = state.incomes.reduce((s,i)=>s+i.amount,0);
  const totalSpent   = state.exps.reduce((s,e)=>s+e.amount,0);
  const fixedTotal   = state.fixed.reduce((s,f)=>s+f.amount,0);
  const totalCatBudget = state.cats.reduce((s,c)=>s+(c.budget||0),0);
  const remaining    = totalCatBudget - totalSpent;
  const catTotals    = {};
  state.exps.forEach(e=>{catTotals[e.categoryId]=(catTotals[e.categoryId]||0)+e.amount;});
  const cardTotals   = {};
  state.exps.forEach(e=>{if(e.cardId&&e.cardId!=="cash")cardTotals[e.cardId]=(cardTotals[e.cardId]||0)+e.amount;});
  return {totalIncome,totalSpent,fixedTotal,totalCatBudget,remaining,catTotals,cardTotals};
}

function doLogin(){
  const pw = document.getElementById("pwInput").value;
  const savedPw = ls("kk_pw", DEFAULT_PW);
  if(pw === savedPw){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    // lastExpDateгӮ’localStorageгҒӢгӮүеҫ©е…ғ
    state.lastExpDate = ls("kk_lastExpDate", today());
    initApp();
  } else {
    document.getElementById("loginErr").textContent = "гғ‘гӮ№гғҜгғјгғүгҒҢйҒ•гҒ„гҒҫгҒҷрҹ”җ";
    const card = document.getElementById("loginCard");
    card.classList.add("shake");
    setTimeout(()=>card.classList.remove("shake"),500);
    document.getElementById("pwInput").value = "";
  }
}

function initApp(){
  // KipsгҒЁPayPayгҒҢжңӘзҷ»йҢІгҒӘгӮүиҝҪеҠ пјҲгӮ«гғјгғүпјү
  const ids = state.cards.map(c=>c.id);
  if(!ids.includes("kips")){
    state.cards.push({id:"kips",name:"KipsгӮ«гғјгғү",icon:"рҹ’і",color:"#2e7d32"});
  }
  if(!ids.includes("paypay")){
    state.cards.push({id:"paypay",name:"PayPayгӮ«гғјгғү",icon:"рҹ’і",color:"#ff6600"});
  }
  // PayPayгҒҢйӣ»еӯҗгғһгғҚгғјгҒ«жңӘзҷ»йҢІгҒӘгӮүиҝҪеҠ 
  const emIds = state.emoney.map(e=>e.id);
  if(!emIds.includes("paypay")){
    state.emoney.push({id:"paypay",name:"PayPay",icon:"рҹ“ұ",color:"#ff6600",balance:0});
  }
  saveAll();
  buildTabs();
  renderAll();
  setTab("home");
}

function buildTabs(){
  const c = document.getElementById("tabsContainer");
  c.innerHTML = TABS.map(([key,icon,label])=>
    `<button class="tab-btn" id="tab-${key}" onclick="setTab('${key}')">${icon} ${label}</button>`
  ).join("");
}

function setTab(key){
  state.tab = key;
  TABS.forEach(([k])=>{
    document.getElementById(`tab-${k}`).classList.toggle("active", k===key);
    document.getElementById(`page-${k}`).classList.toggle("active", k===key);
  });
  renderPage(key);
}

function renderAll(){ updateHeader(); renderPage(state.tab); }

function updateHeader(){
  const bm = getBM();
  const {totalSpent,totalCatBudget,remaining} = calcTotals();
  document.getElementById("bmLabel").textContent = bm.label;
  document.getElementById("headerSavings").textContent = yen(state.savings);
  const remEl = document.getElementById("headerRemaining");
  remEl.textContent = yen(remaining);
  remEl.style.color = remaining < totalCatBudget*0.1 ? "#ffe082" : "#fff";
  document.getElementById("headerSpent").textContent = "дҪҝгҒЈгҒҹ: "+yen(totalSpent);
  document.getElementById("headerBudget").textContent = "еӨүеӢ•иІ»дәҲз®—: "+yen(totalCatBudget);
  const pct = totalCatBudget>0 ? Math.max(0,Math.min(100,(remaining/totalCatBudget)*100)) : 100;
  const bar = document.getElementById("balanceBar");
  bar.style.width = pct+"%";
  bar.style.background = remaining<totalCatBudget*0.1 ? "#ffe082" : remaining<totalCatBudget*0.2 ? "#a5f3fc" : "#fff";
  document.getElementById("tipBox").textContent = "рҹ’Ў "+TIPS[new Date().getDate()%TIPS.length];
}

function renderPage(key){
  updateHeader();
  const el = document.getElementById("page-"+key);
  switch(key){
    case "home":     el.innerHTML = renderHome(); break;
    case "income":   el.innerHTML = renderIncome(); break;
    case "budget":   el.innerHTML = renderBudget(); break;
    case "fixed":    el.innerHTML = renderFixed(); break;
    case "weekly":   el.innerHTML = renderWeekly(); break;
    case "history":  el.innerHTML = renderHistory(); break;
    case "cards":    el.innerHTML = renderCards(); break;
    case "accounts": el.innerHTML = renderAccounts(); break;
    case "emoney":   el.innerHTML = renderEmoney(); break;
    case "savings":  el.innerHTML = renderSavings(); break;
    case "settings": el.innerHTML = renderSettings(); break;
  }
  if(key==="accounts") bindAccountInputs();
}

  const cashCount = state.exps.filter(e=>!e.cardId||e.cardId==="cash").length;

  let cardList = state.cards.map(card=>{
    const total=cardTotals[card.id]||0;
    // д»ҠжңҲж”Ҝжү•еҲҶпјҲtype:"payment"пјүгҒЁд»ҠжңҲеҲ©з”ЁеҲҶпјҲtype:"usage"гҒҫгҒҹгҒҜгҒӘгҒ—пјүгҒ«еҲҶгҒ‘гӮӢ

        <div style="flex:1;font-size:12px;color:#555">${exp.note||cat.label}</div>
        <div style="font-size:11px;color:#aaa">${exp.date}</div>
        <div style="font-weight:700;font-size:13px">${yen(exp.amount)}</div>
      </div>`;
    }).join("");

    return `<div class="card" style="margin-bottom:12px">
      <!-- гӮ«гғјгғүгғҳгғғгғҖгғј -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div style="width:48px;height:48px;border-radius:14px;background:${card.color}20;display:flex;align-items:center;justify-content:center;font-size:26px">${card.icon}</div>
        <div style="flex:1"><div style="font-weight:800;font-size:15px;color:#333">${card.name}</div></div>
        <div style="text-align:right">
          <div style="font-weight:900;font-size:20px;color:${card.color}">${yen(total)}</div>
          <div style="font-size:10px;color:#aaa">еҗҲиЁҲ</div>
        </div>
      </div>

      <!-- д»ҠжңҲж”Ҝжү•еҲҶ -->
      <div style="background:#fff8e1;border-radius:12px;padding:10px 12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;font-weight:700;color:#f57f17">рҹ’і д»ҠжңҲж”Ҝжү•еҲҶпјҲе…ҲжңҲеҲ©з”ЁеҲҶпјү</span>
          <span style="font-size:16px;font-weight:900;color:#f57f17">${yen(paymentTotal)}</span>
        </div>
        ${paymentExps.length>0?`<div style="border-top:1px solid #ffe082;padding-top:6px">${renderItems(paymentExps)}${paymentExps.length>3?`<div style="font-size:11px;color:#aaa;text-align:center;margin-top:4px">д»–${paymentExps.length-3}д»¶</div>`:""}</div>`:`<div style="font-size:11px;color:#aaa">гҒӘгҒ—</div>`}

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;font-weight:700;color:#1565c0">рҹ’і д»ҠжңҲеҲ©з”ЁеҲҶпјҲжқҘжңҲж”Ҝжү•гҒ„пјү</span>
          <span style="font-size:16px;font-weight:900;color:#1565c0">${yen(usageTotal)}</span>

        <button style="flex:1;background:#f0f7ff;color:#4facfe;border:none;border-radius:10px;padding:8px;font-weight:700;font-size:12px;cursor:pointer" onclick="showEditCardModal('${card.id}')">вңҸпёҸ з·ЁйӣҶ</button>

      </div>
    </div>`;
  }).join("");

  // гӮ«гғјгғүе…ЁдҪ“гҒ®еҗҲиЁҲ
  const allCardTotal = state.cards.reduce((s,card)=>{
    return s + state.exps.filter(e=>e.cardId===card.id).reduce((ss,e)=>ss+e.amount,0);

  const allPaymentTotal = state.cards.reduce((s,card)=>{

  return `

          <div style="font-size:18px;font-weight:900;color:#ffe082">${yen(allPaymentTotal)}</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:10px;color:rgba(255,255,255,0.8)">д»ҠжңҲеҲ©з”ЁеҲҶ</div>
          <div style="font-size:18px;font-weight:900;color:#fff">${yen(allUsageTotal)}</div>
        </div>

function showAddEmoneyModal(idx){
  const em=state.emoney[idx];
  // гғҒгғЈгғјгӮёе…ғгҒ®йҒёжҠһиӮўпјҲеҸЈеә§пјӢжүӢе…ғзҸҫйҮ‘пјү

    +state.accounts.filter(a=>a.id!=="cash").map(a=>`<button class="chip" id="charge_${a.id}" onclick="selectChargeFrom('${a.id}')" style="background:#f5f5f5;color:#555">${a.icon} ${a.name}</button>`).join("");

  openModal(`рҹ’і ${em.name}гҒ«гғҒгғЈгғјгӮё`,`
    <div style="background:#fff3e0;border-radius:12px;padding:12px;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:36px">${em.icon}</span>

          <div style="font-weight:800;font-size:15px;color:#333">${em.name}</div>
          <div style="font-size:13px;color:#e65100;font-weight:700">зҸҫеңЁгҒ®ж®Ӣй«ҳ: ${yen(em.balance)}</div>
        </div>
      </div>
      <div style="font-size:11px;color:#888;margin-top:8px">рҹ’Ў гҒҠйҮ‘гҒ®з§»еӢ•гҒ®гҒҝгғ»ж”ҜеҮәгҒ«гҒҜгҒӘгӮҠгҒҫгҒӣгӮ“</div>
    </div>
    <div class="field"><div class="field-label">гғҒгғЈгғјгӮёе…ғпјҲгҒ©гҒ“гҒӢгӮүз§»гҒ—гҒҫгҒҷгҒӢпјҹпјү</div>
      <div class="chip-group" id="chargeFromGroup">${fromChips}</div>
    </div>
    <div class="field"><div class="field-label">гғҒгғЈгғјгӮёйҮ‘йЎҚ</div>
      <div style="position:relative"><span class="field-prefix" style="color:#e53935">ВҘ</span>
      <input type="number" id="emoneyAmt" placeholder="0" class="field-input-lg"/></div>
    </div>
  `,"гғҒгғЈгғјгӮёгҒҷгӮӢ",()=>{
    const amt=parseInt(document.getElementById("emoneyAmt").value);
    if(!amt||amt<=0)return;
    // йӣ»еӯҗгғһгғҚгғјж®Ӣй«ҳгӮ’еў—гӮ„гҒҷ
    state.emoney[idx].balance+=amt;
    // гғҒгғЈгғјгӮёе…ғгҒ®ж®Ӣй«ҳгӮ’жёӣгӮүгҒҷ
    if(_chargeFromId==="cash"){
      const cashAcc=state.accounts.find(a=>a.id==="cash");
      if(cashAcc)cashAcc.balance-=amt;
    } else {
      state.accounts=state.accounts.map(a=>a.id===_chargeFromId?{...a,balance:a.balance-amt}:a);
    }
    saveAll(); closeModal(); renderPage("emoney");
  });
  // еҲқжңҹйҒёжҠһ
  setTimeout(()=>selectChargeFrom("cash"),50);
}

function selectChargeFrom(id){
  _chargeFromId=id;
  document.querySelectorAll("#chargeFromGroup .chip").forEach(b=>{b.style.background="#f5f5f5";b.style.color="#555";});
  const btn=document.getElementById("charge_"+id);
  if(btn){btn.style.background="#555";btn.style.color="#fff";}
}

function changePw(){
  const p1=document.getElementById("pwNew1").value;

  if(!p1){msg.style.color="#ff6b6b";msg.textContent="е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„";return;}
  if(p1.length<6){msg.style.color="#ff6b6b";msg.textContent="6ж–Үеӯ—д»ҘдёҠгҒ«гҒ—гҒҰгҒҸгҒ гҒ•гҒ„";return;}
  if(p1!==p2){msg.style.color="#ff6b6b";msg.textContent="гғ‘гӮ№гғҜгғјгғүгҒҢдёҖиҮҙгҒ—гҒҫгҒӣгӮ“";return;}
  ss("kk_pw",p1);
  msg.style.color="#43e97b";msg.textContent="вң… еӨүжӣҙгҒ—гҒҫгҒ—гҒҹпјҒ";
  document.getElementById("pwNew1").value="";
  document.getElementById("pwNew2").value="";
}

function delExp(idx){ state.exps.splice(idx,1); saveAll(); renderPage("history"); }
function delIncome(idx){ state.incomes.splice(idx,1); saveAll(); renderPage("income"); }
function delFixed(idx){ state.fixed.splice(idx,1); saveAll(); renderPage("fixed"); }
function delCard(id){ state.cards=state.cards.filter(c=>c.id!==id); state.exps=state.exps.map(e=>e.cardId===id?{...e,cardId:"cash"}:e); saveAll(); renderPage("cards"); }
function delAccount(id){ state.accounts=state.accounts.filter(a=>a.id!==id); saveAll(); renderPage("accounts"); }
function delCat(id){
  if(state.cats.length<=1)return;
  state.cats=state.cats.filter(c=>c.id!==id);
  state.exps=state.exps.map(e=>e.categoryId===id?{...e,categoryId:"other"}:e);
  saveAll(); renderPage("settings");
}
function moveFixed(idx,dir){
  const a=state.fixed,ni=idx+dir;
  if(ni<0||ni>=a.length)return;
  [a[idx],a[ni]]=[a[ni],a[idx]];
  saveAll(); renderPage("fixed");
}
function moveCat(idx,dir){
  const a=state.cats,ni=idx+dir;
  if(ni<0||ni>=a.length)return;
  [a[idx],a[ni]]=[a[ni],a[idx]];
  saveAll(); renderPage("settings");
}

function addExp(){
  const amt=parseInt(document.getElementById("expAmount").value);
  if(!amt||amt<=0)return;
  const note=document.getElementById("expNote").value;
  const date=document.getElementById("expDate").value||today();

  state.lastExpDate=date;

  const cardType=(_expCardId&&_expCardId!=="cash"&&!_expCardId.startsWith("em_"))?_cardType:"usage";
  state.exps.unshift({id:Date.now(),amount:amt,categoryId:_expCatId,cardId:_expCardId,cardType,note,date});

}

  `,"дҝқеӯҳгҒҷгӮӢ",()=>{
    const name=document.getElementById("cardEditName").value.trim();
    if(!name)return;
    const icon=getSelectedIcon("cardEditIcon")||card.icon;
    const color=getSelectedColor("cardEditColor")||card.color;
    const idx=state.cards.findIndex(c=>c.id===id);
    state.cards[idx]={...card,icon,name,color};
    saveAll(); closeModal(); renderPage("cards");
  });
}

// в”Ғв”Ғ еҸЈеә§иҝҪеҠ  в”Ғв”Ғ
function showAddAccModal(){
  openModal("еҸЈеә§гӮ’иҝҪеҠ ",`
    <div class="field">${iconPickerHTML("accIcon","рҹҸҰ",["рҹҸҰ","рҹ’ҙ","рҹҗ·","рҹ’і","рҹ“’","рҹҸ§","рҹ’°","рҹӘҷ","рҹ“ұ","рҹҢҗ"])}</div>
    <div class="field">${colorPickerHTML("accColor","#4facfe",["#4facfe","#43e97b","#ff8c69","#ab8ee8","#ffb347","#ef5350","#66bb6a","#aaa"])}</div>
    <div class="field"><input type="text" id="accName" placeholder="еҸЈеә§еҗҚпјҲдҫӢпјҡгҖҮгҖҮйҠҖиЎҢпјү" class="field-input"/></div>
    <div class="field"><div style="position:relative"><span class="field-prefix" style="color:#4facfe">ВҘ</span>
      <input type="number" id="accBalance" placeholder="зҸҫеңЁгҒ®ж®Ӣй«ҳ" class="field-input-lg"/></div>
    </div>
  `,"иҝҪеҠ гҒҷгӮӢ",()=>{
    const name=document.getElementById("accName").value.trim();
    if(!name)return;
    const icon=getSelectedIcon("accIcon")||"рҹҸҰ";
    const color=getSelectedColor("accColor")||"#4facfe";
    const balance=parseInt(document.getElementById("accBalance").value)||0;
    state.accounts.push({id:"acc_"+Date.now(),icon,name,color,balance});
    saveAll(); closeModal(); renderPage("accounts");
  });
}

// в”Ғв”Ғ гғӘгӮ»гғғгғҲ в”Ғв”Ғ
function showResetModal(){
  const {remaining}=calcTotals();
  openModal("рҹҢё зҜҖзҙ„гҒҠжҘҪгҒ—гҒҝиІҜйҮ‘",`
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:52px">${remaining>0?"рҹҺү":"рҹ”„"}</div>
      ${remaining>0
        ?`<div style="font-weight:800;font-size:18px;color:#333;margin-top:8px">гҒҠз–ІгӮҢж§ҳгҒ§гҒ—гҒҹпјҒ</div>
           <div style="color:#555;font-size:14px;margin-top:6px">ж®ӢйҮ‘ <strong style="color:#ff8c00">${yen(remaining)}</strong> гӮ’зҜҖзҙ„гҒҠжҘҪгҒ—гҒҝиІҜйҮ‘гҒ«з§»гҒ—гҒҰжқҘжңҲгӮ№гӮҝгғјгғҲвңЁ</div>`
        :`<div style="font-weight:700;font-size:15px;color:#888;margin-top:8px">ж®ӢйҮ‘гҒҜгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮгғӘгӮ»гғғгғҲгҒ—гҒҰжқҘжңҲгӮ№гӮҝгғјгғҲгҒ—гҒҫгҒҷгҖӮ</div>`}
    </div>
  `,remaining>0?`${yen(remaining)} гӮ’зҜҖзҙ„гҒҠжҘҪгҒ—гҒҝиІҜйҮ‘гҒёпјҒ`:"гғӘгӮ»гғғгғҲгҒҷгӮӢ",doReset);
}

function doReset(){
  const {remaining}=calcTotals();
  if(remaining>0){
    state.savings+=remaining;
    state.savHist.unshift({date:new Date().toLocaleDateString("ja-JP"),amount:remaining,label:getBM().label});
  }
  state.exps=[]; state.incomes=[];
  saveAll(); closeModal(); renderPage("home");
}

// в”Ғв”Ғ иө·еӢ• в”Ғв”Ғ
document.getElementById("pwInput").focus();
</script>
